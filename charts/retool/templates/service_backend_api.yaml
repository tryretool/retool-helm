{{- $mcp := .Values.mcp | default dict -}}
{{- $mcpBackendMetadata := $mcp.backendMetadata | default dict -}}
{{- $mcpIngress := $mcp.ingress | default dict -}}
{{- $mcpHttpRoute := $mcp.httpRoute | default dict -}}
{{- $legacyBackendMetadataIngress := $mcpBackendMetadata.ingress | default dict -}}
{{- $legacyBackendMetadataHttpRoute := $mcpBackendMetadata.httpRoute | default dict -}}
{{- $hasLegacyBackendMetadataIngress := hasKey $mcpBackendMetadata "ingress" -}}
{{- $hasLegacyBackendMetadataHttpRoute := hasKey $mcpBackendMetadata "httpRoute" -}}
{{- $needsBackendApi := false -}}
{{- if and $mcp.enabled $mcpIngress.enabled (not $hasLegacyBackendMetadataIngress) -}}
{{- range ($mcpIngress.paths | default list) -}}
{{- if eq (.target | default "mcp") "backendApi" -}}
{{- $needsBackendApi = true -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- if and $mcp.enabled $mcpHttpRoute.enabled (not $hasLegacyBackendMetadataHttpRoute) -}}
{{- range ($mcpHttpRoute.rules | default list) -}}
{{- if eq (.target | default "mcp") "backendApi" -}}
{{- $needsBackendApi = true -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- if and $mcp.enabled $hasLegacyBackendMetadataIngress $legacyBackendMetadataIngress.enabled -}}
{{- $needsBackendApi = true -}}
{{- end -}}
{{- if and $mcp.enabled $hasLegacyBackendMetadataHttpRoute $legacyBackendMetadataHttpRoute.enabled -}}
{{- $needsBackendApi = true -}}
{{- end -}}
{{- if and $mcp.enabled $needsBackendApi }}
{{- $service := ($mcpBackendMetadata.service | default dict) -}}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "retool.labels" . | nindent 4 }}
  {{- range $key, $value := $service.labels }}
    {{ $key }}: {{ $value | quote }}
  {{- end }}
  name: {{ template "retool.backendApi.name" . }}
  {{- with $service.annotations }}
  annotations:
    {{- range $key, $value := . }}
      {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: {{ $service.portName | default "http-api" }}
      port: {{ $service.externalPort | default 3001 }}
      targetPort: {{ $service.internalPort | default 3001 }}
      protocol: TCP
  selector:
{{- include "retool.selectorLabels" . | nindent 4 }}
{{- end }}
