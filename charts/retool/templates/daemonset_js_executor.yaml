{{- if $.Values.jsExecutor.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: js-executor-seccomp-node-installer
spec:
  selector:
    matchLabels:
      app: js-executor-seccomp-node-installer
  template:
    metadata:
      labels:
        app: js-executor-seccomp-node-installer
      annotations:
        checksum/seccomp: {{ include (print $.Template.BasePath "/js-executor-seccomp-configmap.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: install
          image: busybox:1.37.0@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - /bin/sh
            - -c
            - |
              DEST="/host-seccomp/profiles/nsjail-seccomp.json"
              mkdir -p "$(dirname "$DEST")"
              cp /seccomp-profile/nsjail-seccomp.json "$DEST"
              echo "seccomp profile installed at $DEST"
          volumeMounts:
            - name: seccomp-profile
              mountPath: /seccomp-profile
            - name: host-seccomp
              mountPath: /host-seccomp
      containers:
        - name: pause
          image: busybox:1.37.0@sha256:b3255e7dfbcd10cb367af0d409747d511aeb66dfac98cf30e97e87e4207dd76f
          command: ["sleep", "infinity"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
      volumes:
        - name: seccomp-profile
          configMap:
            name: js-executor-seccomp
        - name: host-seccomp
          hostPath:
            path: /var/lib/kubelet/seccomp
            type: DirectoryOrCreate
{{- end }}
