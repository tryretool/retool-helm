{{- if eq (include "retool.rr.componentEnabled" (dict "root" $ "component" "agentSandbox")) "1" }}
{{- $as := .Values.rr.agentSandbox -}}
{{- $nodeSelector := $as.nodeSelector | default .Values.nodeSelector -}}
{{- $tolerations := $as.tolerations | default .Values.tolerations -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "retool.agentSandbox.name" . }}-image-prepuller
  labels:
    {{- include "retool.agentSandbox.labels" . | nindent 4 }}
    {{- include "retool.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-prepuller
spec:
  selector:
    matchLabels:
      retoolService: {{ include "retool.agentSandbox.name" . }}-image-prepuller
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 100%
  template:
    metadata:
      labels:
        retoolService: {{ include "retool.agentSandbox.name" . }}-image-prepuller
        app.kubernetes.io/name: {{ include "retool.agentSandbox.name" . }}-image-prepuller
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: image-prepuller
        {{- include "retool.labels" . | nindent 8 }}
{{- if .Values.podLabels }}
{{ toYaml .Values.podLabels | indent 8 }}
{{- end }}
    spec:
      automountServiceAccountToken: false
{{- if $nodeSelector }}
      nodeSelector:
{{ toYaml $nodeSelector | indent 8 }}
{{- end }}
      tolerations:
{{ toYaml $tolerations | indent 8 }}
      terminationGracePeriodSeconds: 5
      initContainers:
        - name: pull-image
          image: "{{ $as.image.repository }}:{{ $as.image.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ $as.image.pullPolicy }}
          command: ["true"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
      containers:
        - name: pause
          image: "{{ $as.initImage.repository }}:{{ $as.initImage.tag }}{{- if $as.initImage.digest }}@{{ $as.initImage.digest }}{{- end }}"
          command: ["sleep", "infinity"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
{{- if .Values.image.pullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.image.pullSecrets | indent 8 }}
{{- end }}
{{- end }}
