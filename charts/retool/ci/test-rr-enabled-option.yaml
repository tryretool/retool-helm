# RR master switch — single flag turns on the whole RR stack.
#
# Exercises the `rr.enabled: true` inherit path: agent, jsExecutor, and
# agentSandbox all leave their own `enabled` unset (null) and inherit the master
# switch. This guards `retool.rr.componentEnabled` and the helper-routed
# cross-component env wiring (backend/workflows/jobs/workers read
# effective-enabled, not the raw per-component flag). mcp is intentionally NOT
# part of the master switch (it is opt-in via mcp.enabled, since it needs its
# own OAuth config), so it must not render from rr.enabled alone.
#
# Secrets/config below are only what each component requires to template when
# enabled; none of them set `*.enabled`, so enablement comes solely from rr.
rr:
  enabled: true

  blobStorage:
    s3:
      bucket: rr-test-bucket
      region: us-east-1

  agentSandbox:
    # jwtPublicKey is injected raw into the sandbox job-template JSON, so it MUST
    # be single-line (\n-escaped) or templating breaks.
    jwtPublicKey: '-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEljtqa2nhBwe/PqNhWgPHhj0jv8AIY+QUCicYtfv9wLGcEGPQuXoBQtuoIuOwXOdbEWgrQyLdIEb0YjegAW3miA==\n-----END PUBLIC KEY-----'
    jwtPrivateKey: '-----BEGIN EC PRIVATE KEY-----\nMHcCAQEEIMFXLiN/YsJv89D2YkEZ6/Dj5fujghENmYTOilwdChU3oAoGCCqGSM49AwEHoUQDQgAEljtqa2nhBwe/PqNhWgPHhj0jv8AIY+QUCicYtfv9wLGcEGPQuXoBQtuoIuOwXOdbEWgrQyLdIEb0YjegAW3miA==\n-----END EC PRIVATE KEY-----'
    # encryption key is required (proxy derives the asset-token HMAC key from it)
    encryptionKey: a12b01429fe0fe69a80da94e9e837ab2f1e9bda378ed8a25905a238f6fea6b7a
    postgres:
      url: postgres://retool:retool@agent-sandbox-db.example.internal:5432/agent_sandbox
      schema: agent_executor
    proxy:
      service:
        type: ClusterIP
      ingress:
        enabled: false
    networkPolicy:
      enabled: false
